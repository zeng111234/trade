name: QDII每日投资计划
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '运行测试模式'
        required: false
        default: false
        type: boolean
      budget:
        description: '自定义预算'
        required: false
        type: string
      strategy:
        description: '分配策略'
        required: false
        default: 'dynamic'
        type: choice
        options:
          - dynamic
          - scarce
          - low_fee
          - equal

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install deps
        run: npm install
      - name: run allocator
        run: |
          CMD="node index.js"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          if [ -n "${{ inputs.budget }}" ]; then
            CMD="$CMD --budget ${{ inputs.budget }}"
          fi
          if [ -n "${{ inputs.strategy }}" ]; then
            CMD="$CMD --strategy ${{ inputs.strategy }}"
          fi
          echo "Running: $CMD"
          eval $CMD
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}